<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建Meta自动化任务</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        /* 模态框遮罩 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        /* 模态框内容 */
        .modal-content {
            background-color: #fff;
            border-radius: 8px;
            width: 900px;
            max-width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
        }
        /* 关闭按钮 */
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover {
            color: #333;
        }
        /* 标题 */
        .modal-title {
            font-size: 20px;
            font-weight: 500;
            color: #333;
            margin-bottom: 32px;
        }
        /* 表单分组标题 */
        .form-group-title {
            font-size: 18px;
            font-weight: 500;
            color: #333;
            margin: 32px 0 24px 0;
            padding-left: 8px;
            border-left: 4px solid #4080ff;
        }
        /* 表单项 */
        .form-item {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }
        .form-item label {
            width: 140px;
            text-align: right;
            padding-right: 12px;
            line-height: 32px;
            font-size: 14px;
            color: #333;
            flex-shrink: 0;
        }
        .form-item .required {
            color: #ff4d4f;
            margin-right: 4px;
        }
        .form-item .form-control {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        /* 输入框样式 */
        .input-text {
            height: 32px;
            padding: 4px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-text:focus {
            border-color: #4080ff;
        }
        /* 字符计数 */
        .char-count {
            font-size: 12px;
            color: #909399;
            margin-top: 4px;
            text-align: right;
        }
        /* 状态/选项按钮组（互斥） */
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-option {
            height: 32px;
            padding: 0 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background-color: #fff;
            color: #606266;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-option.active {
            background-color: #4080ff;
            border-color: #4080ff;
            color: #fff;
        }
        .btn-option:hover:not(.active) {
            border-color: #4080ff;
            color: #4080ff;
        }
        /* 时间/数字输入组 */
        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-group span {
            color: #606266;
            font-size: 14px;
            line-height: 32px;
        }
        .input-group .input-text {
            width: 100px;
        }
        /* 时间选择组 */
        .time-range-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .time-input {
            height: 32px;
            padding: 4px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            width: 120px;
        }
        .time-input:focus {
            border-color: #4080ff;
        }
        .time-range-group span {
            color: #606266;
            font-size: 14px;
        }
        .add-time-btn {
            color: #4080ff;
            font-size: 14px;
            cursor: pointer;
            margin-top: 4px;
            align-self: flex-start;
        }
        .add-time-btn:hover {
            color: #66a1ff;
        }
        /* 执行频率 */
        .frequency-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .frequency-group .input-text {
            width: 160px;
        }
        .frequency-group span {
            color: #606266;
            font-size: 14px;
            line-height: 32px;
        }
        /* 选择短剧 - 多选标签 */
        .drama-select-container {
            position: relative;
            width: 100%;
        }
        .drama-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 8px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            min-height: 32px;
            align-items: center;
            cursor: pointer;
        }
        .drama-tag {
            background-color: #f5f7fa;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 14px;
            color: #606266;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tag-close {
            font-size: 14px;
            color: #909399;
            cursor: pointer;
            line-height: 1;
        }
        .tag-close:hover {
            color: #606266;
        }
        .drama-dropdown-arrow {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #909399;
            cursor: pointer;
        }
        .drama-dropdown-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background-color: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .drama-dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            padding: 8px 12px;
            font-size: 14px;
            color: #606266;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .dropdown-item:hover {
            background-color: #f5f7fa;
        }
        /* 结束运行条件 */
        .condition-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        .condition-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .condition-select {
            height: 32px;
            padding: 4px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            background-color: #fff;
            min-width: 140px;
        }
        .condition-operator {
            height: 32px;
            padding: 4px 8px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            background-color: #fff;
            width: 60px;
            text-align: center;
        }
        .condition-input {
            height: 32px;
            padding: 4px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            flex: 1;
            max-width: 200px;
        }
        .condition-input:focus {
            border-color: #4080ff;
        }
        .condition-delete {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            color: #ff4d4f;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        /* 素材配置-统计范围 */
        .stat-range-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-range-select {
            height: 32px;
            padding: 4px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            background-color: #fff;
            min-width: 100px;
        }
        .stat-range-input {
            display: none;
            align-items: center;
            gap: 8px;
        }
        .stat-range-input.show {
            display: flex;
        }
        /* 介于操作符双输入 */
        .between-input-group {
            display: none;
            align-items: center;
            gap: 8px;
        }
        .between-input-group.show {
            display: flex;
        }
        .single-input {
            display: flex;
        }
        .single-input.hide {
            display: none;
        }
        .condition-input-wrap {
            display: flex;
            align-items: center;
            position: relative;
        }
        .condition-input-wrap .condition-input {
            padding-right: 24px;
        }
        .condition-input-suffix {
            position: absolute;
            right: 8px;
            color: #909399;
            font-size: 14px;
            pointer-events: none;
        }
        /* 提示文字 */
        .tip-text {
            font-size: 12px;
            color: #909399;
            line-height: 32px;
            margin-left: 8px;
        }
        .error-tip {
            display: none;
            font-size: 12px;
            color: #ff4d4f;
            margin-top: 4px;
        }
        .error-tip.show {
            display: block;
        }
        /* 底部操作按钮 */
        .form-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }
        .btn-cancel {
            height: 32px;
            padding: 0 16px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background-color: #fff;
            color: #606266;
        }
        .btn-cancel:hover {
            border-color: #4080ff;
            color: #4080ff;
        }
        .btn-submit {
            height: 32px;
            padding: 0 16px;
            border: 1px solid #4080ff;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background-color: #4080ff;
            color: #fff;
        }
        .btn-submit:hover {
            background-color: #66a1ff;
            border-color: #66a1ff;
        }
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #c1c12px;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-track {
            background-color: #f1f1f1;
        }
        /* 短剧搜索新样式 */
        .drama-search-section {
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 16px;
        }
        .drama-tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }
        .drama-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            padding: 4px 0;
        }
        .drama-tab input {
            accent-color: #4080ff;
        }
        .drama-tab.active {
            color: #4080ff;
            font-weight: 500;
        }
        .drama-search-panel {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .drama-search-panel .form-item {
            margin-bottom: 0;
        }
        .drama-search-panel .form-item label {
            width: auto;
            text-align: left;
            padding-right: 8px;
        }
        .drama-input {
            height: 32px;
            padding: 4px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            width: 180px;
        }
        .drama-input:focus {
            border-color: #4080ff;
        }
        .drama-lang-select {
            height: 32px;
            padding: 4px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
            outline: none;
            background-color: #fff;
            min-width: 120px;
        }
        .drama-search-btn {
            height: 32px;
            padding: 0 16px;
            border: 1px solid #4080ff;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background-color: #4080ff;
            color: #fff;
        }
        .drama-search-btn:hover {
            background-color: #66a1ff;
            border-color: #66a1ff;
        }
        .drama-result-card {
            margin-top: 16px;
            padding: 16px;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            transition: border-color 0.2s;
        }
        .drama-result-card:hover {
            border-color: #4080ff;
        }
        .drama-result-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 24px;
            margin-bottom: 12px;
        }
        .drama-result-item {
            display: flex;
            gap: 8px;
            font-size: 14px;
        }
        .drama-result-item .label {
            color: #909399;
        }
        .drama-result-item .value {
            color: #606266;
        }
        .drama-result-actions {
            display: flex;
            justify-content: flex-end;
        }
        .drama-add-btn {
            padding: 6px 16px;
            background: #fff;
            border: 1px solid #4080ff;
            color: #4080ff;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drama-add-btn:hover {
            background: #4080ff;
            color: #fff;
        }
        .drama-add-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .drama-placeholder {
            text-align: center;
            padding: 24px;
            color: #909399;
            font-size: 14px;
        }
        .selected-dramas-area {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed #dcdfe6;
        }
        .selected-dramas-title {
            font-size: 14px;
            color: #606266;
            margin-bottom: 8px;
        }
        .selected-dramas-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .selected-drama-tag {
            background-color: #f5f7fa;
            border-radius: 4px;
            padding: 4px 12px;
            font-size: 14px;
            color: #606266;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .selected-drama-tag .remove {
            cursor: pointer;
            color: #909399;
            font-size: 16px;
            line-height: 1;
        }
        .selected-drama-tag .remove:hover {
            color: #ff4d4f;
        }
    </style>
</head>
<body>
    <!-- 模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-close" id="modalClose">&times;</div>
            <div class="modal-title">新建Meta自动化任务</div>

            <form id="autoTaskForm">
                <!-- 基本信息分组 -->
                <div class="form-group-title">基本信息</div>

                <!-- 任务名称 -->
                <div class="form-item">
                    <label>
                        <span class="required">*</span>任务名称
                    </label>
                    <div class="form-control">
                        <input type="text" class="input-text" id="taskName" maxlength="50" placeholder="请输入任务名称">
                        <div class="char-count" id="taskNameCount">0 / 50</div>
                    </div>
                </div>

                <!-- 状态 -->
                <div class="form-item">
                    <label>
                        <span class="required">*</span>状态
                    </label>
                    <div class="form-control">
                        <div class="btn-group">
                            <button type="button" class="btn-option active" data-status="1">启用</button>
                            <button type="button" class="btn-option" data-status="0">停用</button>
                        </div>
                    </div>
                </div>

                <!-- 生效时间 -->
                <div class="form-item">
                    <label>
                        <span class="required">*</span>生效时间(UTC+8)
                    </label>
                    <div class="form-control" id="timeRangeContainer">
                        <div class="time-range-group">
                            <input type="time" class="time-input" value="00:00:00" step="1">
                            <span>~</span>
                            <input type="time" class="time-input" value="23:59:59" step="1">
                        </div>
                        <div class="add-time-btn" id="addTimeRange">+ 添加时间范围</div>
                    </div>
                </div>

                <!-- 执行频率 -->
                <div class="form-item">
                    <label>
                        <span class="required">*</span>执行频率
                    </label>
                    <div class="form-control">
                        <div class="frequency-group">
                            <span>间隔</span>
                            <input type="number" class="input-text" id="executeFrequency" min="1" placeholder="请输入">
                            <span>分钟执行一次</span>
                        </div>
                    </div>
                </div>

                <!-- 选择短剧 -->
                <div class="form-item">
                    <label>
                        <span class="required">*</span>选择短剧
                    </label>
                    <div class="form-control">
                        <div class="drama-search-section">
                            <div class="drama-tabs">
                                <label class="drama-tab active" id="tabDramaName">
                                    <input type="radio" name="dramaSearchMode" value="drama" checked onchange="switchDramaMode('drama')">
                                    <span>按短剧搜索</span>
                                </label>
                                <label class="drama-tab" id="tabPlaybook">
                                    <input type="radio" name="dramaSearchMode" value="playbook" onchange="switchDramaMode('playbook')">
                                    <span>按剧本搜索</span>
                                </label>
                            </div>

                            <div class="drama-search-panel">
                                <div class="form-item" id="dramaNamePanel">
                                    <label>短剧名称</label>
                                    <input type="text" class="drama-input" placeholder="请输入短剧名称" id="dramaNameInput">
                                </div>
                                <div class="form-item" id="playbookPanel" style="display:none">
                                    <label>剧本</label>
                                    <input type="text" class="drama-input" placeholder="输入剧本ID或剧本名" id="playbookInput">
                                </div>
                                <div class="form-item" id="dramaLangPanel" style="display:none">
                                    <label>语言</label>
                                    <select class="drama-lang-select" id="dramaLangSelect">
                                        <option value="">请选择语言</option>
                                        <option value="zh">中文</option>
                                        <option value="en">英文</option>
                                        <option value="th">泰文</option>
                                        <option value="ms">马来文</option>
                                    </select>
                                </div>
                                <button type="button" class="drama-search-btn" onclick="searchDramas()">搜索</button>
                            </div>

                            <div id="dramaSearchResult">
                                <div class="drama-placeholder">请输入搜索条件进行搜索</div>
                            </div>

                            <div class="selected-dramas-area" id="selectedDramasArea" style="display:none">
                                <div class="selected-dramas-title">已选短剧</div>
                                <div class="selected-dramas-list" id="selectedDramasList"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 结束运行条件 - 固定不可修改 -->
                <div class="form-item">
                    <label>
                        <span class="required">*</span>结束运行条件
                    </label>
                    <div class="form-control">
                        <div class="condition-group" id="endConditionGroup">
                            <div class="condition-row">
                                <select class="condition-select" disabled>
                                    <option value="series_count">单账户在投总系列数</option>
                                </select>
                                <select class="condition-operator" disabled>
                                    <option value=">=">>=</option>
                                </select>
                                <input type="number" class="condition-input" placeholder="请输入数值" min="0">
                                <!-- 结束条件删除按钮隐藏 -->
                                <button type="button" class="condition-delete" style="display:none;">&times;</button>
                            </div>
                            <div class="condition-row">
                                <select class="condition-select" disabled>
                                    <option value="account_count">账户数</option>
                                </select>
                                <select class="condition-operator" disabled>
                                    <option value=">=">>=</option>
                                </select>
                                <input type="number" class="condition-input" placeholder="请输入数值" min="0">
                                <!-- 结束条件删除按钮隐藏 -->
                                <button type="button" class="condition-delete" style="display:none;">&times;</button>
                            </div>
                        </div>
                        <!-- 隐藏添加条件按钮 -->
                        <div class="add-time-btn" id="addEndCondition" style="display: none;">+ 添加条件</div>
                    </div>
                </div>

                <!-- ==================== 素材配置模块 ==================== -->
                <div class="form-group-title">素材配置</div>

                <!-- 素材创建时间 -->
                <div class="form-item" id="materialTimeItem">
                    <label>
                        <span class="required">*</span>素材创建时间
                    </label>
                    <div class="form-control">
                        <div class="btn-group" id="materialCreateTime">
                            <button type="button" class="btn-option active" data-day="unlimit">不限</button>
                            <button type="button" class="btn-option" data-day="1">1天</button>
                            <button type="button" class="btn-option" data-day="3">3天</button>
                            <button type="button" class="btn-option" data-day="7">7天</button>
                            <button type="button" class="btn-option" data-day="15">15天</button>
                            <button type="button" class="btn-option" data-day="30">30天</button>
                        </div>
                    </div>
                </div>

                <!-- 素材数据筛选 -->
                <div class="form-item">
                    <label>
                        <span class="required">*</span>素材数据筛选
                    </label>
                    <div class="form-control">
                        <div class="btn-group" id="materialFilterType">
                            <button type="button" class="btn-option active" data-type="unlimit">不限</button>
                            <button type="button" class="btn-option" data-type="custom">自定义</button>
                        </div>
                    </div>
                </div>

                <!-- 素材数量（自定义时显示） -->
                <div class="form-item" id="materialCountItem" style="display: none;">
                    <label>
                        <span class="required">*</span>素材数量
                    </label>
                    <div class="form-control">
                        <div class="btn-group" id="materialCountType">
                            <button type="button" class="btn-option active" data-type="unlimit">不限</button>
                            <button type="button" class="btn-option" data-type="custom">自定义</button>
                        </div>
                        <div class="input-group" id="materialCountInput" style="display: none;">
                            <input type="number" class="input-text" id="materialCount" min="1" placeholder="请输入">
                        </div>
                    </div>
                </div>

                <!-- 素材投放时间 -->
                <div class="form-item" id="statRangeItem">
                    <label>素材投放时间</label>
                    <div class="form-control">
                        <div class="btn-group" id="statRangeBtns">
                            <button type="button" class="btn-option active" data-day="unlimit">累计</button>
                            <button type="button" class="btn-option" data-day="1">1天</button>
                            <button type="button" class="btn-option" data-day="3">3天</button>
                            <button type="button" class="btn-option" data-day="7">7天</button>
                            <button type="button" class="btn-option" data-day="15">15天</button>
                            <button type="button" class="btn-option" data-day="30">30天</button>
                        </div>
                    </div>
                </div>

                <!-- 筛选条件列表 -->
                <div class="form-item" id="materialConditionItem">
                    <label>筛选条件</label>
                    <div class="form-control">
                        <div class="condition-group" id="materialConditionGroup">
                            <div class="condition-row">
                                <select class="condition-select material-condition-metric">
                                    <option value="cost">消耗</option>
                                    <option value="doroi">DOROI</option>
                                    <option value="compliance">综合达标率</option>
                                </select>
                                <select class="condition-operator material-condition-operator">
                                    <option value=">=">>=</option>
                                    <option value=">">></option>
                                    <option value="=">=</option>
                                    <option value="<"><</option>
                                    <option value="<="><=</option>
                                    <option value="between">介于</option>
                                </select>
                                <div class="single-input">
                                    <div class="condition-input-wrap">
                                        <input type="text" class="condition-input" placeholder="请输入">
                                        <span class="condition-input-suffix" style="display:none;">%</span>
                                    </div>
                                </div>
                                <div class="between-input-group">
                                    <div class="condition-input-wrap">
                                        <input type="text" class="condition-input" placeholder="请输入">
                                        <span class="condition-input-suffix" style="display:none;">%</span>
                                    </div>
                                    <span>至</span>
                                    <div class="condition-input-wrap">
                                        <input type="text" class="condition-input" placeholder="请输入">
                                        <span class="condition-input-suffix" style="display:none;">%</span>
                                    </div>
                                </div>
                                <!-- 素材筛选删除按钮 正常显示 -->
                                <button type="button" class="condition-delete">&times;</button>
                            </div>
                        </div>
                        <div class="add-time-btn" id="addMaterialCondition">+ 添加条件</div>
                        <div class="error-tip" id="materialConditionError">不能重复选择相同条件类型</div>
                        <div class="error-tip" id="materialConditionRequired">选择自定义时，至少需要输入一个条件</div>
                    </div>
                </div>

                <!-- 按指标排序（自定义时显示） -->
                <div class="form-item" id="sortMetricItem" style="display: none;">
                    <label>按指标排序</label>
                    <div class="form-control">
                        <div class="btn-group" id="sortMetricBtns">
                            <button type="button" class="btn-option active" data-metric="compliance">综合达标率</button>
                            <button type="button" class="btn-option" data-metric="cost">消耗</button>
                            <button type="button" class="btn-option" data-metric="doroi">D0ROI</button>
                        </div>
                    </div>
                </div>

                <!-- 素材重复次数 -->
                <div class="form-item">
                    <label>素材重复次数</label>
                    <div class="form-control">
                        <div class="btn-group" id="repeatCountType">
                            <button type="button" class="btn-option active" data-type="unlimit">不限</button>
                            <button type="button" class="btn-option" data-type="custom">自定义</button>
                        </div>
                        <div class="input-group" id="repeatCountInput" style="display: none;">
                            <input type="number" class="input-text" id="repeatCount" min="1" placeholder="请输入">
                            <span class="tip-text">不填写默认30</span>
                        </div>
                    </div>
                </div>

                <!-- 广告数 -->
                <div class="form-item">
                    <label>广告数</label>
                    <div class="form-control">
                        <div class="input-group">
                            <input type="number" class="input-text" id="adCount" min="1" placeholder="请输入">
                            <span class="tip-text">不填写默认30</span>
                        </div>
                    </div>
                </div>
                <!-- ==================== 素材配置模块 结束 ==================== -->

                <!-- 底部操作按钮 -->
                <div class="form-footer">
                    <button type="button" class="btn-cancel" id="btnCancel">取消</button>
                    <button type="submit" class="btn-submit">确定</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================== 基础功能逻辑 ====================
        const modalClose = document.getElementById('modalClose');
        const modalOverlay = document.getElementById('modalOverlay');
        const btnCancel = document.getElementById('btnCancel');

        const closeModal = () => {
            modalOverlay.style.display = 'none';
        };
        modalClose.addEventListener('click', closeModal);
        btnCancel.addEventListener('click', closeModal);

        // ==================== 短剧搜索功能 ====================
        function switchDramaMode(mode) {
            const tabDramaName = document.getElementById('tabDramaName');
            const tabPlaybook = document.getElementById('tabPlaybook');
            const dramaNamePanel = document.getElementById('dramaNamePanel');
            const playbookPanel = document.getElementById('playbookPanel');
            const dramaLangPanel = document.getElementById('dramaLangPanel');
            const result = document.getElementById('dramaSearchResult');

            if (mode === 'drama') {
                tabDramaName.classList.add('active');
                tabPlaybook.classList.remove('active');
                dramaNamePanel.style.display = 'flex';
                playbookPanel.style.display = 'none';
                dramaLangPanel.style.display = 'none';
                result.innerHTML = '<div class="drama-placeholder">请输入短剧名称进行搜索</div>';
            } else {
                tabPlaybook.classList.add('active');
                tabDramaName.classList.remove('active');
                dramaNamePanel.style.display = 'none';
                playbookPanel.style.display = 'flex';
                dramaLangPanel.style.display = 'flex';
                result.innerHTML = '<div class="drama-placeholder">输入剧本ID或剧本名，可选语言筛选</div>';
            }
        }

        function searchDramas() {
            const mode = document.querySelector('input[name="dramaSearchMode"]:checked').value;
            const dramaName = document.getElementById('dramaNameInput').value;
            const playbookInput = document.getElementById('playbookInput').value;
            const lang = document.getElementById('dramaLangSelect').value;

            if (mode === 'drama') {
                if (!dramaName) {
                    alert('请输入短剧名称');
                    return;
                }
                const result = document.getElementById('dramaSearchResult');
                result.innerHTML = `
                    <div class="drama-result-card">
                        <div class="drama-result-info">
                            <div class="drama-result-item">
                                <span class="label">剧本名称：</span>
                                <span class="value">繁花</span>
                            </div>
                            <div class="drama-result-item">
                                <span class="label">剧本ID：</span>
                                <span class="value">L0001</span>
                            </div>
                            <div class="drama-result-item">
                                <span class="label">短剧名称：</span>
                                <span class="value">繁花</span>
                            </div>
                            <div class="drama-result-item">
                                <span class="label">语言：</span>
                                <span class="value">中文</span>
                            </div>
                        </div>
                        <div class="drama-result-actions">
                            <button class="drama-add-btn" onclick="addDrama(this)">+ 添加到投放</button>
                        </div>
                    </div>
                `;
            } else {
                if (!playbookInput) {
                    alert('请输入剧本ID或剧本名');
                    return;
                }

                const langMap = { 'zh': '中文', 'en': '英文', 'th': '泰文', 'ms': '马来文' };
                const nameMap = { 'zh': '繁花', 'en': 'Blooming', 'th': 'บุษบา', 'ms': 'Mekar' };

                let cards = '';
                if (lang) {
                    const langName = langMap[lang];
                    const dramaNameResult = nameMap[lang];
                    cards += `
                        <div class="drama-result-card">
                            <div class="drama-result-info">
                                <div class="drama-result-item">
                                    <span class="label">剧本名称：</span>
                                    <span class="value">繁花</span>
                                </div>
                                <div class="drama-result-item">
                                    <span class="label">剧本ID：</span>
                                    <span class="value">L0001</span>
                                </div>
                                <div class="drama-result-item">
                                    <span class="label">短剧名称：</span>
                                    <span class="value">${dramaNameResult}</span>
                                </div>
                                <div class="drama-result-item">
                                    <span class="label">语言：</span>
                                    <span class="value">${langName}</span>
                                </div>
                            </div>
                            <div class="drama-result-actions">
                                <button class="drama-add-btn" onclick="addDrama(this)">+ 添加到投放</button>
                            </div>
                        </div>
                    `;
                } else {
                    const countries = ['新加坡', '马来西亚', '泰国', '菲律宾'];
                    const langs = ['zh', 'en', 'th', 'ms'];
                    countries.forEach((country, i) => {
                        const l = langs[i % langs.length];
                        const langName = langMap[l];
                        const dramaNameResult = nameMap[l];
                        cards += `
                            <div class="drama-result-card">
                                <div class="drama-result-info">
                                    <div class="drama-result-item">
                                        <span class="label">剧本名称：</span>
                                        <span class="value">繁花</span>
                                    </div>
                                    <div class="drama-result-item">
                                        <span class="label">剧本ID：</span>
                                        <span class="value">L0001</span>
                                    </div>
                                    <div class="drama-result-item">
                                        <span class="label">短剧名称：</span>
                                        <span class="value">${dramaNameResult}</span>
                                    </div>
                                    <div class="drama-result-item">
                                        <span class="label">语言：</span>
                                        <span class="value">${langName}</span>
                                    </div>
                                </div>
                                <div class="drama-result-actions">
                                    <button class="drama-add-btn" onclick="addDrama(this)">+ 添加到投放</button>
                                </div>
                            </div>
                        `;
                    });
                }

                const result = document.getElementById('dramaSearchResult');
                result.innerHTML = cards;
            }
        }

        function addDrama(btn) {
            const card = btn.closest('.drama-result-card');
            const items = card.querySelectorAll('.drama-result-item .value');
            const playbookId = items[1].textContent;
            const playbookName = items[0].textContent;
            const dramaName = items[2].textContent;
            const lang = items[3].textContent;

            const tagText = `${playbookId}-${playbookName}-${dramaName}-${lang}`;

            // 检查是否已存在
            const existingTags = Array.from(document.querySelectorAll('.selected-drama-tag span:first-child'))
                .map(el => el.textContent);
            if (existingTags.includes(tagText)) {
                alert('该短剧已添加');
                return;
            }

            const list = document.getElementById('selectedDramasList');
            const area = document.getElementById('selectedDramasArea');
            const newTag = document.createElement('div');
            newTag.className = 'selected-drama-tag';
            newTag.innerHTML = `
                <span>${tagText}</span>
                <span class="remove" onclick="removeDrama(this)">&times;</span>
            `;
            list.appendChild(newTag);
            area.style.display = 'block';

            btn.textContent = '已添加';
            btn.disabled = true;
        }

        function removeDrama(btn) {
            btn.closest('.selected-drama-tag').remove();
            const area = document.getElementById('selectedDramasArea');
            const list = document.getElementById('selectedDramasList');
            if (list.querySelectorAll('.selected-drama-tag').length === 0) {
                area.style.display = 'none';
            }
        }

        // 任务名称计数
        const taskNameInput = document.getElementById('taskName');
        const taskNameCount = document.getElementById('taskNameCount');
        taskNameInput.addEventListener('input', () => {
            const len = taskNameInput.value.length;
            taskNameCount.textContent = `${len} / 50`;
        });

        // 状态切换
        const statusBtns = document.querySelectorAll('.btn-option[data-status]');
        statusBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                statusBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // 添加时间范围
        const addTimeRangeBtn = document.getElementById('addTimeRange');
        const timeRangeContainer = document.getElementById('timeRangeContainer');
        addTimeRangeBtn.addEventListener('click', () => {
            const newTimeRow = document.createElement('div');
            newTimeRow.className = 'time-range-group';
            newTimeRow.innerHTML = `
                <input type="time" class="time-input" value="00:00:00" step="1">
                <span>~</span>
                <input type="time" class="time-input" value="23:59:59" step="1">
                <span class="tag-close" style="cursor: pointer; color: #909399;">&times;</span>
            `;
            timeRangeContainer.insertBefore(newTimeRow, addTimeRangeBtn);
            const closeBtn = newTimeRow.querySelector('.tag-close');
            closeBtn.addEventListener('click', () => {
                timeRangeContainer.removeChild(newTimeRow);
            });
        });

        // ==================== 素材配置交互 ====================
        const materialFilterTypeBtns = document.querySelectorAll('#materialFilterType .btn-option');

        const createTimeBtns = document.querySelectorAll('#materialCreateTime .btn-option');
        createTimeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                createTimeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

const statRangeItem = document.getElementById('statRangeItem');
        const materialConditionItem = document.getElementById('materialConditionItem');
        const sortMetricItem = document.getElementById('sortMetricItem');
        const materialCountItem = document.getElementById('materialCountItem');
        const materialCountBtns = document.querySelectorAll('#materialCountType .btn-option');
        const materialCountInput = document.getElementById('materialCountInput');
        materialCountBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                materialCountBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                materialCountInput.style.display = btn.dataset.type === 'custom' ? 'flex' : 'none';
            });
        });
        materialFilterTypeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                materialFilterTypeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

        const sortMetricBtns = document.querySelectorAll('#sortMetricBtns .btn-option');
        sortMetricBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                sortMetricBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        checkMaterialFilterVisible();
                checkMaterialConditionRequired();
            });
        });

        function checkMaterialFilterVisible() {
            const filterType = document.querySelector('#materialFilterType .btn-option.active').dataset.type;
            statRangeItem.style.display = filterType === 'unlimit' ? 'none' : 'flex';
            materialConditionItem.style.display = filterType === 'unlimit' ? 'none' : 'flex';
            sortMetricItem.style.display = filterType === 'unlimit' ? 'none' : 'flex';
            materialCountItem.style.display = filterType === 'unlimit' ? 'none' : 'flex';
        }

        const statRangeBtns = document.querySelectorAll('#statRangeBtns .btn-option');
        statRangeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                statRangeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        const togglePercentSuffix = (row) => {
            const metric = row.querySelector('.material-condition-metric').value;
            const showPercent = metric === 'doroi' || metric === 'compliance';
            row.querySelectorAll('.condition-input-suffix').forEach(s => s.style.display = showPercent ? 'inline' : 'none');
        };

        const bindOperatorChange = (row) => {
            const operator = row.querySelector('.material-condition-operator');
            const singleInput = row.querySelector('.single-input');
            const betweenInput = row.querySelector('.between-input-group');
            operator.addEventListener('change', () => {
                const isBetween = operator.value === 'between';
                singleInput.classList.toggle('hide', isBetween);
                betweenInput.classList.toggle('show', isBetween);
                checkMaterialConditionDuplicate();
            });
        };

        const checkMaterialConditionDuplicate = () => {
            const metrics = Array.from(document.querySelectorAll('.material-condition-metric')).map(m => m.value);
            const hasDuplicate = new Set(metrics).size !== metrics.length;
            document.getElementById('materialConditionError').classList.toggle('show', hasDuplicate);
            return !hasDuplicate;
        };

        const addMaterialConditionBtn = document.getElementById('addMaterialCondition');
        const materialConditionGroup = document.getElementById('materialConditionGroup');
        addMaterialConditionBtn.addEventListener('click', () => {
            const newRow = document.createElement('div');
            newRow.className = 'condition-row';
            newRow.innerHTML = `
                <select class="condition-select material-condition-metric">
                    <option value="cost">消耗</option>
                    <option value="doroi">DOROI</option>
                    <option value="compliance">综合达标率</option>
                </select>
                <select class="condition-operator material-condition-operator">
                    <option value=">=">>=</option><option value=">">></option><option value="=">=</option>
                    <option value="<"><</option><option value="<="><=</option><option value="between">介于</option>
                </select>
                <div class="single-input">
                    <div class="condition-input-wrap">
                        <input type="text" class="condition-input" placeholder="请输入">
                        <span class="condition-input-suffix" style="display:none;">%</span>
                    </div>
                </div>
                <div class="between-input-group">
                    <div class="condition-input-wrap">
                        <input type="text" class="condition-input" placeholder="请输入">
                        <span class="condition-input-suffix" style="display:none;">%</span>
                    </div>
                    <span>至</span>
                    <div class="condition-input-wrap">
                        <input type="text" class="condition-input" placeholder="请输入">
                        <span class="condition-input-suffix" style="display:none;">%</span>
                    </div>
                </div>
                <button type="button" class="condition-delete">&times;</button>
            `;
            materialConditionGroup.appendChild(newRow);
            newRow.querySelector('.condition-delete').addEventListener('click', () => newRow.remove());
            bindOperatorChange(newRow);
            newRow.querySelector('.material-condition-metric').addEventListener('change', function() {
                checkMaterialConditionDuplicate();
                togglePercentSuffix(newRow);
            });
            togglePercentSuffix(newRow);
            checkMaterialConditionDuplicate();
        });

        const checkMaterialConditionRequired = () => {
            const filterType = document.querySelector('#materialFilterType .btn-option.active').dataset.type;
            const needCheck = filterType === 'custom';
            const hasRows = document.querySelectorAll('#materialConditionGroup .condition-row').length > 0;
            document.getElementById('materialConditionRequired').classList.toggle('show', needCheck && !hasRows);
            return !needCheck || hasRows;
        };

        document.querySelectorAll('#materialConditionGroup .condition-row').forEach(row => {
            bindOperatorChange(row);
            row.querySelector('.material-condition-metric').addEventListener('change', function() {
                checkMaterialConditionDuplicate();
                togglePercentSuffix(row);
            });
            togglePercentSuffix(row);
        });
        // 只绑定素材区域的删除按钮，不绑定结束条件
        document.querySelectorAll('#materialConditionGroup .condition-delete').forEach(btn => {
            btn.addEventListener('click', () => btn.parentElement.remove());
        });

        const repeatCountBtns = document.querySelectorAll('#repeatCountType .btn-option');
        const repeatCountInput = document.getElementById('repeatCountInput');
        repeatCountBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                repeatCountBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                repeatCountInput.style.display = btn.dataset.type === 'custom' ? 'flex' : 'none';
            });
        });

        checkMaterialFilterVisible();

        // ==================== 表单提交 ====================
        const autoTaskForm = document.getElementById('autoTaskForm');
        autoTaskForm.addEventListener('submit', (e) => {
            e.preventDefault();

            if (!checkMaterialConditionRequired()) {
                alert('选择自定义时，至少需要输入一个条件');
                return;
            }

            const formData = {
                taskName: taskNameInput.value,
                status: document.querySelector('.btn-option[data-status].active').dataset.status,
                timeRanges: Array.from(timeRangeContainer.querySelectorAll('.time-range-group')).map(row => ({
                    start: row.querySelectorAll('.time-input')[0].value,
                    end: row.querySelectorAll('.time-input')[1].value
                })),
                executeFrequency: document.getElementById('executeFrequency').value,
                dramas: Array.from(document.querySelectorAll('.selected-drama-tag span:first-child')).map(t => t.textContent),
                // 固定结束条件
                endConditions: [
                    { metric: 'series_count', name: '单账户在投总系列数', operator: '>=', value: document.querySelectorAll('#endConditionGroup .condition-input')[0].value },
                    { metric: 'account_count', name: '账户数', operator: '>=', value: document.querySelectorAll('#endConditionGroup .condition-input')[1].value }
                ],
                material: {
                    createTime: document.querySelector('#materialCreateTime .btn-option.active').dataset.day,
                    filterType: document.querySelector('#materialFilterType .btn-option.active').dataset.type,
                    statRange: document.querySelector('#statRangeBtns .btn-option.active').dataset.day,
                    sortMetric: document.querySelector('#sortMetricBtns .btn-option.active').dataset.metric,
                    materialCount: document.querySelector('#materialCountType .btn-option.active').dataset.type === 'custom'
                        ? document.getElementById('materialCount').value : 'unlimit',
                    conditions: Array.from(document.querySelectorAll('#materialConditionGroup .condition-row')).map(row => {
                        const m = row.querySelector('.material-condition-metric').value;
                        const o = row.querySelector('.material-condition-operator').value;
                        const i = row.querySelectorAll('.condition-input');
                        return o === 'between' ? { metric: m, operator: o, min: i[0].value, max: i[1].value }
                                               : { metric: m, operator: o, value: i[0].value };
                    }),
                    repeatCount: document.querySelector('#repeatCountType .btn-option.active').dataset.type === 'custom'
                        ? document.getElementById('repeatCount').value || 30 : 'unlimit',
                    adCount: document.getElementById('adCount').value || 30
                }
            };

            if (!formData.taskName) { alert('请输入任务名称'); return; }
            if (!formData.executeFrequency) { alert('请输入执行频率'); return; }
            if (formData.dramas.length === 0) { alert('请选择短剧'); return; }
            if (!formData.endConditions[0].value || !formData.endConditions[1].value) { alert('请填写结束运行条件的数值'); return; }

            console.log('提交数据：', formData);
            alert('任务创建成功！');
            closeModal();
        });
    </script>
</body>
</html>
